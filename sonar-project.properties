sonar.projectVersion=0.9.0
sonar.projectKey=ionos-cloud_cluster-api-provider-proxmox
sonar.organization=ionos-cloud

# Source and test files are in the same directories
sonar.sources=.
sonar.tests=.

# Include test files in test scope (hack/spec/** is the ShellSpec suite)
sonar.test.inclusions=test/**,**/*_test.go,hack/spec/**

# Exclude autogenerated test files and shell fixtures from test scope
sonar.test.exclusions=**/mock_*.go,hack/spec/fixtures/**

# Exclude test and autogenerated files from source scope
sonar.exclusions=test/**,**/*_test.go,**/mock_*.go,**/zz_generated*.go,templates/crs/cni/**,hack/spec/**

sonar.go.coverage.reportPaths=cover.out
sonar.coverageReportPaths=hack/spec/coverage/sonarqube.xml
