---
version: 2
updates:
- package-ecosystem: "gomod"
  directory: "/"
  schedule:
    interval: "daily"
  groups:
    kubernetes:
      patterns:
      - k8s.io/api
      - k8s.io/apimachinery
      - k8s.io/client-go
    cluster-api:
      patterns:
      - sigs.k8s.io/cluster-api
      - sigs.k8s.io/cluster-api/test

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "daily"
