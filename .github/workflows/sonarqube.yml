# SECURITY: this workflow has SONAR_TOKEN and checks out untrusted PR code.
# Never execute PR-controlled scripts (make, npm, sh, ...). PR-shipped sonar
# inputs (config, coverage) are wiped on checkout; trusted replacements come
# from $RUNNER_TEMP.
name: SonarQube
on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  sonar:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-slim
    steps:

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Erase PR-shipped sonar config and coverage
        run: rm -f sonar-project.properties cover.out

      - name: Use trusted sonar config from default branch
        run: |
          git fetch --depth=1 "https://github.com/${{ github.repository }}.git" HEAD
          git show FETCH_HEAD:sonar-project.properties > "${RUNNER_TEMP}/sonar-project.properties"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: ${{ runner.temp }}/coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract cover.out from artifact
        run: |
          test -f "${RUNNER_TEMP}/coverage/cover.out"
          cp "${RUNNER_TEMP}/coverage/cover.out" cover.out

      - name: SonarQube scan for PR ${{ github.event.workflow_run.pull_requests[0].number }}
        if: github.event.workflow_run.event == 'pull_request'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        with:
          args: >
            -Dproject.settings=${{ runner.temp }}/sonar-project.properties
            -Dsonar.pullrequest.key=${{ github.event.workflow_run.pull_requests[0].number }}
            -Dsonar.scm.revision=${{ github.event.workflow_run.head_sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube scan
        if: github.event.workflow_run.event == 'push'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        with:
          args: -Dproject.settings=${{ runner.temp }}/sonar-project.properties
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
