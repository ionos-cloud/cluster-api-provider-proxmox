name: Test
on:
  push:
    branches: ["main"]
  pull_request_target:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # cache: false — pull_request_target gives this job write access to
      # the base branch's GHA cache scope, and make verify / make test runs
      # PR-controlled code that could otherwise poison Go module / build
      # cache entries consumed by later main-branch builds.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - run: "make verify"
      - run: "make test"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: cover.out
          retention-days: 7

  # SECURITY: this job runs with SONAR_TOKEN and checks out untrusted PR code.
  # It must never execute PR-controlled scripts (make, npm, sh, ...). All
  # scanner inputs are read from $RUNNER_TEMP; PR-shipped copies of the same
  # files in the workspace are wiped first as a guard.
  sonar:
    needs: test
    runs-on: ubuntu-slim
    environment: sonar
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Erase PR-shipped sonar config and coverage
        run: rm -rf sonar-project.properties cover.out

      - name: Use trusted sonar config from default branch
        run: |
          git fetch --depth=1 "https://github.com/${{ github.repository }}.git" HEAD
          git show FETCH_HEAD:sonar-project.properties > "${RUNNER_TEMP}/sonar-project.properties"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: ${{ runner.temp }}/coverage

      - name: SonarQube scan for PR ${{ github.event.pull_request.number }}
        if: github.event_name == 'pull_request_target'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        with:
          args: >
            -Dproject.settings=${{ runner.temp }}/sonar-project.properties
            -Dsonar.go.coverage.reportPaths=${{ runner.temp }}/coverage/cover.out
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}
            -Dsonar.scm.revision=${{ github.event.pull_request.head.sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube scan
        if: github.event_name == 'push'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        with:
          args: >
            -Dproject.settings=${{ runner.temp }}/sonar-project.properties
            -Dsonar.go.coverage.reportPaths=${{ runner.temp }}/coverage/cover.out
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
