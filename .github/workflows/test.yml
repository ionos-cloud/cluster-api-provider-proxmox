name: Test
on:
  push:
    branches: ["main"]
  pull_request_target:
    branches: ["main"]

jobs:
  confirm:
    # check if confirmation is necessary
    if: github.event_name == 'pull_request_target'
    # request confirmation
    environment: e2e
    runs-on: ubuntu-latest
    steps:
      - run: ":"

  test:
    # check the result of confirmation if necessary
    # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#example-not-requiring-successful-dependent-jobs
    # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/evaluate-expressions-in-workflows-and-actions#always
    if: ${{ !cancelled() }}
    needs: [confirm]

    runs-on: ubuntu-latest
    steps:

      - name: checkout PR ${{ github.event.pull_request.number }}
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # for SonarQube
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: checkout
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # for SonarQube

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: "make verify"
      - run: "make test"

      - name: Check for hack/ changes
        id: hack
        run: |
          BASE=${{ github.event.pull_request.base.sha || github.event.before }}
          if git diff --name-only "$BASE" HEAD -- hack/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ShellSpec
        if: steps.hack.outputs.changed == 'true'
        uses: actions/checkout@v6
        with:
          repository: shellspec/shellspec
          ref: 90e48c950239f3b8a9fdfa3e869592872c77b981 # v0.28.1
          path: .shellspec

      - name: Add ShellSpec to PATH
        if: steps.hack.outputs.changed == 'true'
        run: echo "${{ github.workspace }}/.shellspec" >> "$GITHUB_PATH"

      - name: Install kcov
        if: steps.hack.outputs.changed == 'true'
        run: sudo apt-get update && sudo apt-get install -y kcov

      - name: Run shell tests
        if: steps.hack.outputs.changed == 'true'
        run: make test-sh

      - name: SonarQube for PR ${{ github.event.pull_request.number }}
        if: github.event_name == 'pull_request_target'
        uses: SonarSource/sonarqube-scan-action@v7
        with:
         args: >
           -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
           -Dsonar.scm.revision=${{ github.event.pull_request.head.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube
        if: github.event_name == 'push'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
