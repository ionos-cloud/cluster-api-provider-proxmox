# Triggers on push to main and pull_request_target. PR runs use base-repo
# workflow (a fork can't edit this file), with these layered controls:
#   pre-screen — git-only checks (diff size, sensitive paths, file modes).
#                No PR code execution.
#   test-go    — PR Go code runs in a digest-pinned Go container with
#                permissions:{} to avoid cache poisoning.
#   test-sh    — PR shell tests run on ubuntu-26.04 with permissions:{},
#                gated by pre-screen exactly like test-go.
#   sonar      — environment-gated SONAR_TOKEN; upstream and PR trees in
#                separate paths. Scanner reads PR sources with upstream config
#                (fork PRs) or PR config (internal PRs); never runs PR code.

name: Test

on:
  pull_request_target: {}
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: test-${{ github.event.pull_request.number || github.ref }}

jobs:
  pre-screen:
    # Fork PRs only. Internal PRs and push events skip; downstream `if` allows skipped.
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-slim
    permissions: {}
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Bail on large diffs
        run: |
          if [ "$CHANGED_FILES" -gt 20 ]; then
            echo "::error::PR changes ${CHANGED_FILES} files (>5%); please split the PR into reviewable chunks or request maintainer adoption"
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # base history back to BASE_SHA
          persist-credentials: false  # keep token out of .git/config so make verify / make test can't read it

      # Fetch by ref (refs/pull/N/head is always advertised); pin to event-context
      # HEAD_SHA so we screen exactly what the test jobs will execute.
      - name: Fetch PR head and verify it matches the event payload
        run: |
          set -euo pipefail
          git fetch --no-tags origin "refs/pull/${PR_NUMBER}/head"
          if [ "$(git rev-parse FETCH_HEAD)" != "$HEAD_SHA" ]; then
            echo "::error::PR head moved since trigger ($HEAD_SHA → $(git rev-parse FETCH_HEAD)); cancel-in-progress should have aborted this run"
            exit 1
          fi

      # --no-renames so a rename yields both paths; either side touching sensitive paths fails.
      - name: Sensitive-path scan
        run: |
          set -euo pipefail
          hits=$(git diff --name-only --no-renames -z "$BASE_SHA" "$HEAD_SHA" \
            | grep -z -E '^(Makefile|\.github/|go\.(mod|sum)|sonar-project\.properties|Dockerfile|hack/|tilt-provider\.json|\.[^/]+)' \
            | tr '\0' '\n' || true)
          if [ -n "$hits" ]; then
            echo "::error::PR touches sensitive paths; re-submit via maintainer-authored PR. Offending paths:"
            echo "$hits"
            exit 1
          fi

      # Allow only regular files (100644) and executables (100755).
      - name: Non-normal file mode scan
        run: |
          set -euo pipefail
          bad=$(git ls-tree -r "$HEAD_SHA" | awk '$1 != "100644" && $1 != "100755"')
          if [ -n "$bad" ]; then
            echo "::error::PR contains non-normal Git tree entries (only regular files allowed). Offending entries:"
            echo "$bad"
            exit 1
          fi

  test-go:
    needs: pre-screen
    # always() bypasses GHA's "skip when needs.* == skipped"; the conjunction limits to success/skipped (not failure/cancelled).
    if: always() && (needs.pre-screen.result == 'success' || needs.pre-screen.result == 'skipped')
    runs-on: ubuntu-latest
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        include:
          - go: "1.26"
            image: golang@sha256:0dcba0d95dbfb072e9917a106b9e07d7cc298097dc83e9307056ef1889de654d # 1.26.4-trixie
          #- go: "1.27"
          #  image: golang@sha256:TODO # 1.27.0-trixie
    # Allow the 1.26 job to fail on PRs labelled go/1.27 (code requires 1.27).
    continue-on-error: ${{ matrix.go == '1.26' && contains(github.event.pull_request.labels.*.name, 'go/1.27') }}
    container:
      image: ${{ matrix.image }}
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      # Container runs as root; the workspace is owned by the runner UID. Without this, `git diff` in `make verify` would fail with "dubious ownership".
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - run: make verify
      - run: make test

      # Upload even on failure: sonar runs on test failure too, and `go test`
      # writes the coverage profile before its non-zero exit, so a failing run
      # still gets a sonar report. If the file is missing (catastrophic failure)
      # the upload just fails and sonar has nothing to run against anyway.
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-${{ matrix.go }}
          path: cover.out
          if-no-files-found: error
          retention-days: 7

  test-sh:
    needs: pre-screen
    # Same pre-screen gate as test-go: fork PRs touching hack/ are already blocked, so running PR shell code here is as safe as test-go.
    if: always() && (needs.pre-screen.result == 'success' || needs.pre-screen.result == 'skipped')
    # ubuntu-26.04 ships yq and, unlike 24.04, has kcov (v43, emits sonarqube.xml) in its repos.
    runs-on: ubuntu-26.04
    permissions: {}
    env:
      GOTOOLCHAIN: local
    steps:
      # Check out into pr/ so kcov's absolute coverage paths (.../pr/hack/x.sh) match the
      # files the sonar job indexes: it checks out the PR into pr/ and scans with
      # projectBaseDir=pr, and both hosted runners share /home/runner/work/<repo>/<repo>.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: pr
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      # The shell helpers shell out to `go list` / `go mod edit`; pin Go to go.mod.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: pr/go.mod

      - name: Install ShellSpec
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          repository: shellspec/shellspec
          ref: 90e48c950239f3b8a9fdfa3e869592872c77b981 # v0.28.1
          path: .shellspec
      - name: Add ShellSpec to PATH
        run: realpath .shellspec >> "$GITHUB_PATH"

      - name: Install kcov
        run: sudo apt-get update && sudo apt-get install -y kcov

      - run: make test-sh
        working-directory: pr

      # Upload even on failure (see test-go): kcov writes sonarqube.xml before
      # make test-sh's exit code, so a failing run still feeds sonar.
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sh-coverage
          path: pr/hack/spec/coverage/sonarqube.xml
          if-no-files-found: error
          retention-days: 7

  # SECURITY: holds SONAR_TOKEN. Never execute PR-supplied code, scripts, or actions in this job.
  sonar:
    needs: [test-go, test-sh]
    # Default `if: success()` would skip sonar whenever a test job failed; on main and dependabot PRs that means flaky/genuine test failures silently bypass the quality gate. Run sonar whenever both test jobs actually executed (success or failure), never when they were skipped (pre-screen blocked the PR) or cancelled.
    if: always() && (needs.test-go.result == 'success' || needs.test-go.result == 'failure') && (needs.test-sh.result == 'success' || needs.test-sh.result == 'failure')
    runs-on: ubuntu-slim
    environment: sonar
    permissions:
      contents: read
    env:
      # Fork PRs scan with the upstream sonar config (untrusted PR); internal PRs and pushes scan with the local pr/ tree, so the upstream checkout is skipped for those.
      SONAR_CONFIG_DIR: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'upstream' || 'pr' }}
      # Hardcode the SonarCloud URL so the scanner can't be redirected via PR-supplied sonar.host.url; SONAR_HOST_URL env beats both -D args and sonar-project.properties.
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: upstream
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}  # pin to PR base SHA (matches pre-screen's BASE_SHA)

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # SonarQube needs git history for blame and new-code attribution
          path: pr
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-coverage-1.26
          path: ${{ runner.temp }}/go-coverage

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sh-coverage
          path: ${{ runner.temp }}/sh-coverage

      # fail-fast against malformed coverage file
      - name: Validate coverage file format
        run: head -1 "${RUNNER_TEMP}/go-coverage/cover.out" | grep -q '^mode:'

      - name: SonarQube for PR ${{ github.event.pull_request.number }}
        if: github.event_name == 'pull_request_target'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          args: >
            -Dproject.settings=${{ env.SONAR_CONFIG_DIR }}/sonar-project.properties
            -Dsonar.go.coverage.reportPaths=${{ runner.temp }}/go-coverage/cover.out
            -Dsonar.coverageReportPaths=${{ runner.temp }}/sh-coverage/sonarqube.xml
            -Dsonar.projectBaseDir=pr
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.scm.revision=${{ github.event.pull_request.head.sha }}
            -Dsonar.working.directory=${{ runner.temp }}/scannerwork
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube
        if: github.event_name == 'push'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          args: >
            -Dproject.settings=${{ env.SONAR_CONFIG_DIR }}/sonar-project.properties
            -Dsonar.go.coverage.reportPaths=${{ runner.temp }}/go-coverage/cover.out
            -Dsonar.coverageReportPaths=${{ runner.temp }}/sh-coverage/sonarqube.xml
            -Dsonar.projectBaseDir=pr
            -Dsonar.working.directory=${{ runner.temp }}/scannerwork
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        with:
          scanMetadataReportFile: ${{ runner.temp }}/scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
