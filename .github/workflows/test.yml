# Test workflow — runs on push to main and on every pull_request_target.
#
# We knowingly use pull_request_target so the workflow YAML always comes
# from main (a fork PR cannot edit it). The trade-off: we still execute
# PR-supplied code in `make verify` / `make test`, with base-context
# privilege available to the runner. The layered controls below mitigate
# that:
#
# 1. pre-screen — API-only checks on fork PRs; blocks sensitive-path
#    edits, symlinks, submodules, and PRs whose head SHA shifted between
#    trigger and run start. Runs no PR code.
# 2. test — PR code runs in a digest-pinned Go container with
#    permissions:{} (zero-scope GITHUB_TOKEN). No cache-using actions;
#    the container IS the toolchain, so cache-poisoning surface is
#    structurally absent.
# 3. sonar — environment-gated SONAR_TOKEN; checks out upstream and PR
#    trees to separate paths. The scanner reads upstream config and PR
#    sources via separate -D args without ever executing PR-supplied
#    code, scripts, configs, or actions.
#
# Bumping Go: update go.mod, the container image tag, and the pinned
# digest in lockstep. The container's Go must be >= go.mod's `go`
# directive.

name: Test

on:
  push:
    branches: ["main"]                # default branch only; release branches get coverage via PRs that target them
  pull_request_target: {}             # no branches: filter — PRs targeting main, release/*, or any branch are scanned

permissions:
  contents: read                      # workflow-level floor; jobs may scope down (test: {}) but never up

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true            # new push/force-push cancels not-yet-started prior runs for the same PR

jobs:
  pre-screen:
    # Fork PRs only. Internal PRs and push events skip; downstream `if` allows skipped.
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-slim              # gh api + jq only; slim is sufficient
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
      PR: ${{ github.event.pull_request.number }}
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
      HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
    steps:
      - name: SHA freshness check
        id: pr
        run: |
          set -euo pipefail
          pr_json=$(gh api "repos/${OWNER}/${REPO}/pulls/${PR}")
          live_sha=$(echo "$pr_json" | jq -r '.head.sha')
          if [ "$live_sha" != "$EXPECTED_SHA" ]; then
            echo "::error::PR head SHA changed between trigger and run start (expected ${EXPECTED_SHA}, got ${live_sha}); concurrency cancel-in-progress should have aborted this run"
            exit 1
          fi
          changed_files=$(echo "$pr_json" | jq -r '.changed_files')
          echo "changed_files=${changed_files}" >> "$GITHUB_OUTPUT"

      - name: Sensitive-path scan
        env:
          EXPECTED_COUNT: ${{ steps.pr.outputs.changed_files }}
        run: |
          set -euo pipefail
          files_json=$(mktemp)
          gh api --paginate "repos/${OWNER}/${REPO}/pulls/${PR}/files" \
            | jq -s '[.[][]]' > "$files_json"
          # Truncation cross-check: the /files endpoint silently caps at ~3000 entries (no truncated flag).
          actual=$(jq 'length' < "$files_json")
          if [ "$actual" -ne "$EXPECTED_COUNT" ]; then
            echo "::error::PR /files response has ${actual} entries but PR reports ${EXPECTED_COUNT} changed files; GitHub silently truncated. Diff too large to scan; request PR split."
            exit 1
          fi
          # Match filename and previous_filename (renames) against the sensitive-path regex.
          # Trailing \.[^/]+ catches root dotfiles (.golangci.yml, .mockery.yaml, future hidden config).
          hits=$(jq -r '
            .[]
            | (.filename, (.previous_filename // empty))
            | select(test("^(Makefile|\\.github/|go\\.(mod|sum)|sonar-project\\.properties|Dockerfile|hack/|tilt-provider\\.json|\\.[^/]+)"))
          ' < "$files_json")
          if [ -n "$hits" ]; then
            echo "::error::PR touches sensitive paths; re-submit via maintainer-authored PR. Offending paths:"
            echo "$hits"
            exit 1
          fi

      - name: Symlink and submodule scan
        run: |
          set -euo pipefail
          tree_json=$(gh api "repos/${HEAD_REPO}/git/trees/${EXPECTED_SHA}?recursive=1")
          if [ "$(echo "$tree_json" | jq -r '.truncated')" = "true" ]; then
            echo "::error::Tree response truncated (>100k entries / 7MB); cannot guarantee no symlinks/submodules. Tree too large to scan; request PR split."
            exit 1
          fi
          bad=$(echo "$tree_json" | jq -r '
            .tree[]
            | select(.mode == "120000" or .mode == "160000")
            | "\(.mode) \(.path)"
          ')
          if [ -n "$bad" ]; then
            echo "::error::PR contains symlinks (mode 120000) or submodules (mode 160000); not allowed in fork PRs. Offending entries:"
            echo "$bad"
            exit 1
          fi

  test:
    needs: pre-screen
    # always() bypasses the implicit "skip when predecessor skipped"; the conjunction limits to success/skipped (not failure/cancelled).
    if: always() && (needs.pre-screen.result == 'success' || needs.pre-screen.result == 'skipped')
    runs-on: ubuntu-latest            # CPU/RAM-bound: Go test parallelism + envtest spawns kube-apiserver and etcd; ubuntu-slim's single CPU and reduced RAM would slow tests ~2x and risk OOM
    permissions: {}                   # zero-scope GITHUB_TOKEN; checkout works anonymously against the public repo
    container:
      image: golang@sha256:298734aec230b5f3e8cee450ce6d7eccc39f1797ba548ee90d57e9803030c6c3 # 1.25-bookworm — pinned to remove cache-using-action surface
    env:
      GOTOOLCHAIN: local              # determinism: container's Go is authoritative; do not auto-download via go.mod toolchain directive
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - run: make verify
      - run: make test

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: cover.out
          retention-days: 7

  # SECURITY: this job holds SONAR_TOKEN. It must never execute PR-supplied
  # code, scripts, configs, or actions. Upstream tree is checked out at
  # upstream/, PR tree at pr/; the scanner reads upstream config and PR
  # sources via separate -D arguments.
  sonar:
    needs: test
    runs-on: ubuntu-slim              # single-pass scanner, mostly I/O — slim is sufficient
    environment: sonar                # required-reviewer gate on SONAR_TOKEN release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: upstream              # default ref under pull_request_target is base.ref (main, release/*, ...); trusted upstream tree

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: pr                    # PR tree, isolated from upstream/ on the filesystem

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: ${{ runner.temp }}/coverage

      - name: Validate coverage file format
        run: head -1 "${RUNNER_TEMP}/coverage/cover.out" | grep -q '^mode:'  # fail-fast against malformed coverage probing the parser

      - name: SonarQube scan for PR ${{ github.event.pull_request.number }}
        if: github.event_name == 'pull_request_target'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        with:
          args: >
            -Dproject.settings=upstream/sonar-project.properties
            -Dsonar.projectBaseDir=pr
            -Dsonar.go.coverage.reportPaths=${{ runner.temp }}/coverage/cover.out
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}
            -Dsonar.scm.revision=${{ github.event.pull_request.head.sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube scan
        if: github.event_name == 'push'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        with:
          args: >
            -Dproject.settings=upstream/sonar-project.properties
            -Dsonar.projectBaseDir=pr
            -Dsonar.go.coverage.reportPaths=${{ runner.temp }}/coverage/cover.out
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
